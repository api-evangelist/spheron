apis:
  - aid: spheron:spheron-gpu-cloud-api
    name: Spheron GPU Cloud API
    description: >-
      REST API for programmatically managing GPU deployments across the
      Spheron marketplace. Covers provider and GPU-offer discovery,
      deployment lifecycle (create, list, get, rename, terminate,
      can-terminate), SSH key management, persistent volume create/attach/
      detach, Kubernetes version listing and cluster health, and account
      balance and team endpoints. Authentication is Bearer-token via API
      keys generated from the Spheron dashboard. Base URL is
      https://app.spheron.ai with all endpoints prefixed by /api.
    humanURL: https://docs.spheron.ai/api-reference
    baseURL: https://app.spheron.ai/api
