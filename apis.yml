aid: spheron
name: Spheron
description: >-
  Spheron Network is a decentralized GPU and cloud compute marketplace that
  aggregates enterprise-grade NVIDIA GPU capacity from certified Tier 3/4 data
  centers worldwide and exposes it through a single on-demand, per-minute
  billed interface. The marketplace covers H100, H200, B200, B300, A100,
  GH200, L40S, RTX PRO 6000, RTX 5090, RTX 4090, and pre-order GB200/GB300/
  R100 inventory, priced 40-60% below hyperscaler rates with spot, reserved,
  and custom-cluster (8-512+ GPU) options. Teams access the platform through
  a web dashboard, a documented REST API at app.spheron.ai/api, a TypeScript
  Protocol SDK, an MCP plugin for Claude, SkyPilot integration, and Helm
  charts for self-hosted provider nodes. The Spheron Foundation also
  maintains an open compute protocol with Fizz nodes, provider nodes, ICL
  YAML configuration, and an on-chain payment system supporting both
  traditional payment rails and USDC/USDT stablecoin settlement. The
  company is transitioning from a pure decentralized protocol model toward
  an enterprise GPU procurement and aggregation marketplace while keeping
  the underlying provider network open and community-operated.
